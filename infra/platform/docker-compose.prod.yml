# Production stack on the GPU host: only Qdrant (vector store for Dify).
# Dify runs separately from its official docker-compose (see docs/DIFY_SETUP.md)
# and connects to this Qdrant over the shared docker network.
#
# The portal (api/web/postgres) has been decommissioned — Dify UI is the main system.
# The dkp_postgres_data volume is kept below so old portal data survives on disk;
# never run `docker compose down -v` here.
#
# Qdrant binds to 172.17.0.1 (docker bridge gateway) so Dify containers reach it
# via QDRANT_URL=http://172.17.0.1:6333 — do not expose it on 0.0.0.0.
services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: dkp-qdrant
    restart: unless-stopped
    env_file:
      - ./.deploy-secrets.env
    ports:
      - '172.17.0.1:6333:6333'
      - '172.17.0.1:6334:6334'
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__SERVICE__ENABLE_TLS: 'false'
      QDRANT__SERVICE__GRPC_PORT: '6334'
      QDRANT__LOG_LEVEL: INFO
    volumes:
      - dkp_qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'bash -c ":> /dev/tcp/127.0.0.1/6333" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  dkp_qdrant_data:
  # Data of the decommissioned portal's Postgres — kept on disk, do not delete.
  dkp_postgres_data:
