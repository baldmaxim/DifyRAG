# Production stack for Document Knowledge Portal on a shared GPU host.
# Includes Postgres (app DB), Qdrant, API and Web. Dify runs separately (see deploy script).
#
# All public ports bind to 127.0.0.1 — expose via host Caddy/nginx only.
services:
  postgres:
    image: postgres:16-alpine
    container_name: dkp-postgres
    restart: unless-stopped
    env_file:
      - ./.deploy-secrets.env
    environment:
      POSTGRES_USER: dkp
      POSTGRES_DB: document_portal
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - dkp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dkp} -d ${POSTGRES_DB:-document_portal}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: dkp-qdrant
    restart: unless-stopped
    env_file:
      - ./.deploy-secrets.env
    ports:
      - '127.0.0.1:6333:6333'
      - '127.0.0.1:6334:6334'
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__SERVICE__ENABLE_TLS: 'false'
      QDRANT__SERVICE__GRPC_PORT: '6334'
      QDRANT__LOG_LEVEL: INFO
    volumes:
      - dkp_qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'bash -c ":> /dev/tcp/127.0.0.1/6333" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: dkp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./api.env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '127.0.0.1:3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: dkp-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '8080:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:80/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  dkp_postgres_data:
  dkp_qdrant_data:
