  * { box-sizing: border-box; }
  .num, .ant-statistic-content, td.col-num, .mono { font-variant-numeric: tabular-nums; }
  .mono { font-family: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace; font-size: 12.5px; }

  /* ---- App shell ---- */
  .dkp-logo { display:flex; align-items:center; gap:10px; padding:16px 20px 14px; }
  .dkp-logo-mark { width:30px; height:30px; border-radius:8px; display:grid; place-items:center;
    background:linear-gradient(135deg,#3D6BFF 0%,#2843C8 100%); flex:0 0 auto; }
  .dkp-logo-text { color:#EDF1F9; font-weight:700; font-size:16px; letter-spacing:.4px; line-height:1.1; }
  .dkp-logo-sub { color:#7686A0; font-size:10.5px; font-weight:500; letter-spacing:.6px; text-transform:uppercase; }

  .page-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:16px; flex-wrap:wrap; }
  .page-title { font-size:20px; font-weight:600; line-height:28px; margin:0; }
  .page-desc { font-size:13px; margin-top:2px; }

  /* ---- Pipeline strip (dashboard signature) ---- */
  .pipe { display:flex; align-items:stretch; gap:0; overflow-x:auto; }
  .pipe-stage { flex:1 1 0; min-width:96px; position:relative; padding:10px 14px 10px 20px; }
  .pipe-stage:not(:last-child)::after { content:''; position:absolute; right:-9px; top:50%; width:18px; height:18px;
    transform:translateY(-50%) rotate(45deg); border-top:1px solid var(--pipe-border); border-right:1px solid var(--pipe-border);
    background:inherit; z-index:1; }
  .pipe-count { font-size:20px; font-weight:600; font-variant-numeric:tabular-nums; line-height:1.15; }
  .pipe-label { font-size:11.5px; font-weight:500; letter-spacing:.2px; }

  /* ---- Login ---- */
  .login-wrap { min-height:100vh; display:grid; grid-template-columns: 1.1fr 1fr; }
  .login-brand { position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:space-between; padding:48px; color:#E8EDF8; background:#101828; }
  .login-grid { position:absolute; inset:0; opacity:.5;
    background-image:linear-gradient(rgba(102,134,214,.14) 1px, transparent 1px), linear-gradient(90deg, rgba(102,134,214,.14) 1px, transparent 1px);
    background-size:36px 36px; }
  .login-grid::after { content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at 30% 20%, rgba(61,107,255,.22), transparent 55%); }
  .login-form-col { display:flex; align-items:center; justify-content:center; padding:40px; }
  @media (max-width: 900px){ .login-wrap { grid-template-columns:1fr; } .login-brand{ display:none; } }

  /* ---- JSON / diff viewer ---- */
  .json-view { border-radius:8px; padding:12px 14px; font-family:'IBM Plex Mono',monospace; font-size:12px; line-height:1.65; overflow:auto; }
  .jk { opacity:.68; } .js { } .jn { } .diff-del { text-decoration:line-through; opacity:.55; }
  .diff-add-row { border-radius:4px; padding:0 4px; margin:0 -4px; display:inline-block; }

  /* ---- Swatches ---- */
  .swatch-row { display:flex; gap:8px; flex-wrap:wrap; }
  .swatch { width:120px; border-radius:8px; overflow:hidden; border:1px solid var(--sw-border); }
  .swatch-c { height:44px; } .swatch-t { padding:6px 8px; font-size:11px; line-height:1.5; }

  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { border-radius:6px; background:rgba(128,140,160,.35); border:2px solid transparent; background-clip:content-box; }

  .kpi-card .ant-statistic-title { font-size:12.5px; font-weight:500; letter-spacing:.1px; }

          {key:1,label:'Пользователь',children:<Text className="mono">a.serikova</Text>},
          {key:2,label:'Роль',children:'Администратор'},
          {key:3,label:'Время',children:<Text className="num">08.07.2026 17:50:12</Text>},
          {key:4,label:'IP',children:<Text className="mono">10.4.2.117</Text>},
        ]} />
        <Text strong style={{fontSize:13}}>Изменения (до → после)</Text>
        <Row gutter={12} style={{marginTop:10}}>
          <Col span={12}>
            <Text type="secondary" style={{fontSize:11.5, textTransform:'uppercase', letterSpacing:.5}}>До</Text>
            <div className="json-view" style={{ background: token.colorFillTertiary, border:`1px solid ${token.colorBorderSecondary}`, marginTop:6 }}>

            <div className="json-view" style={{ background: token.colorFillTertiary, border:`1px solid ${token.colorBorderSecondary}`, marginTop:6 }}>

                <J k="timeout_ms" v={30000} />
                <J k="retry" v={3} changed />

};

/* ---- 12. SETTINGS ---- */

  const group = (fields, health) => (
    <div style={{ maxWidth:560 }}>
      <Form layout="vertical" size="middle">
        {fields.map((f,i)=>(
          <Form.Item key={i} label={f.l} tooltip={f.tip} style={{marginBottom:14}}>
            {f.t==='switch' && <Switch defaultChecked={f.v} />}
            {f.t==='num' && <InputNumber defaultValue={f.v} style={{width:160}} addonAfter={f.suf} />}
            {f.t==='text' && <Input defaultValue={f.v} className={f.mono?'mono':''} />}
            {f.t==='secret' && <Input.Password placeholder="•••••••• (оставьте пустым, чтобы не менять)" />}
          </Form.Item>
        ))}
      </Form>
      <Space align="center" wrap>
        <Button icon={Icons.plug}>Проверить соединение</Button>
        {health && <Alert type={health.t} showIcon style={{padding:'4px 10px'}}
          message={<Space size={8}><span>{health.m}</span><Text type="secondary" className="num" style={{fontSize:12}}>{health.lat}</Text></Space>} />}
      </Space>
    </div>
  );
  return (
    <>
      <PageHead title="Настройки" desc="Конфигурация системы · доступно только администраторам"
        extra={<Tag color="purple" style={{marginInlineEnd:0}}>Только Admin</Tag>} />
      <Alert type="info" showIcon style={{ marginBottom:16 }}
        message="Секреты хранятся в зашифрованном виде"
        description="Значения на этой странице переопределяют переменные из .env и применяются немедленно, без перезапуска сервисов." />
      <Card size="small" styles={{ body:{padding:0} }}>
        <Collapse defaultActiveKey={['dify']} bordered={false} items={[
          { key:'s3', label:<Text strong>S3 — хранилище оригиналов</Text>, children: group([
            { l:'Endpoint', t:'text', v:'https://s3.internal:9000', mono:true },
            { l:'Bucket', t:'text', v:'dkp-originals', mono:true },
            { l:'Access Key ID', t:'text', v:'DKPPORTAL01', mono:true },
            { l:'Secret Access Key', t:'secret' },
            { l:'Presigned URL: время жизни', t:'num', v:15, suf:'мин' },
          ], { t:'success', m:'Соединение установлено', lat:'12 мс' }) },
          { key:'dify', label:<Text strong>Dify — RAG-конвейер</Text>, children: group([
            { l:'API URL', t:'text', v:'https://dify.internal/v1', mono:true },
            { l:'API-ключ', t:'secret', tip:'Ключ сервисного аккаунта Dify с правом управления датасетами' },
            { l:'Автоматически создавать датасеты', t:'switch', v:true },
            { l:'Таймаут запроса', t:'num', v:30, suf:'с' },
          ], { t:'success', m:'Соединение установлено', lat:'84 мс' }) },
          { key:'lm', label:<Text strong>LM Studio — эмбеддинги</Text>, children: group([
            { l:'Endpoint', t:'text', v:'http://10.4.0.12:1234', mono:true },
            { l:'Модель', t:'text', v:'bge-m3', mono:true },
            { l:'Размер пакета (batch)', t:'num', v:32 },
          ], { t:'warning', m:'Деградация: отклик выше нормы', lat:'2,4 с' }) },
          { key:'qdrant', label:<Text strong>Qdrant — векторное хранилище</Text>, children: group([
            { l:'Endpoint', t:'text', v:'http://qdrant.internal:6333', mono:true },
            { l:'API-ключ', t:'secret' },
          ], { t:'success', m:'Соединение установлено', lat:'9 мс' }) },
          { key:'proc', label:<Text strong>Обработка</Text>, children: group([
            { l:'Параллельных задач', t:'num', v:4 },
            { l:'Повторов при сбое', t:'num', v:3 },
            { l:'Ставить архивные документы в очередь', t:'switch', v:false },
          ]) },
          { key:'sec', label:<Text strong>Безопасность</Text>, children: group([
            { l:'Время сессии', t:'num', v:8, suf:'ч' },
            { l:'Требовать 2FA для администраторов', t:'switch', v:true },
            { l:'Блокировка после неудачных входов', t:'num', v:5, suf:'попыток' },
          ]) },
        ]} />
      </Card>
    </>
  );
};

  return (

        <Card size="small" title="Палитра">
          <div className="swatch-row">

            <Sw c={token.colorSuccess} n="Success" d="завершено, ок" />
            <Sw c={token.colorWarning} n="Warning" d="деградация" />
            <Sw c={token.colorError} n="Error" d="сбой, ошибка" />

            <Sw c={token.colorTextSecondary} n="Text 2" />
            <Sw c={token.colorBgLayout} n="Bg layout" />

          </div>
        </Card>
        <Card size="small" title="Статусы — документ и пайплайн Dify">
          {groupOf(['queued','uploading','waiting','parsing','cleaning','splitting','indexing','completed','error','archived','disabled'])}
          <Divider style={{margin:'12px 0'}} />
          <Text type="secondary" style={{fontSize:12.5}}>Портальные статусы документа:</Text><br/>
          <div style={{marginTop:8}}>{groupOf(['draft','active','stored','indexed','deleted'])}</div>

        <Row gutter={16}>

            <span style={{fontSize:20,fontWeight:600}}>Заголовок H3 · 20/28 · 600</span>

        </Card>
        <Row gutter={16}>
          <Col xs={24} md={8}>
            <Card size="small" title="Состояние: загрузка"><Skeleton active paragraph={{rows:3}} /></Card>

/* ================================================================

   ================================================================ */

  dashboard: { title:'Дашборд', icon:'dashboard', el:()=><DashboardScreen/> },
  projects:  { title:'Проекты', icon:'projects', el:()=><ProjectsScreen/> },
  project:   { title:'ЖК «Туран»', icon:null, el:()=><ProjectDetailScreen/>, crumb:['Проекты','ЖК «Туран»'] },
  search:    { title:'Поиск', icon:'search', el:()=><SearchScreen/> },
  documents: { title:'Документы', icon:'docs', el:()=><DocumentsScreen/> },
  departments:{ title:'Отделы', icon:'depts', el:()=><DepartmentsScreen/> },
  datasets:  { title:'Dify Datasets', icon:'dataset', el:()=><DatasetsScreen/> },
  integrations:{ title:'Интеграции', icon:'plug', el:()=><IntegrationsScreen/> },
  apikeys:   { title:'API-ключи', icon:'key', el:()=><ApiKeysScreen/> },
  jobs:      { title:'Обработка', icon:'queue', el:()=><JobsScreen/> },
  audit:     { title:'Аудит', icon:'audit', el:()=><AuditScreen/> },
  settings:  { title:'Настройки', icon:'gear2', el:()=><SettingsScreen/> },
  legend:    { title:'Дизайн-система', icon:'palette', el:(d)=><LegendScreen dark={d}/> },
};

const menuItems = [
  ...['dashboard','projects','search','documents','departments','datasets','integrations','apikeys','jobs','audit','settings']
    .map(k=>({ key:k, icon:Icons[SCREENS[k].icon], label:SCREENS[k].title })),
  { type:'divider' },
  { key:'project', icon:Icons.folder, label:'→ Экран проекта' },
  { key:'legend', icon:Icons.palette, label:'→ Дизайн-система' },
  { key:'login', icon:Icons.door, label:'→ Экран входа' },
];

const App = () => {
  const [dark, setDark] = useState(false);
  const [screen, setScreen] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(false);
  const themeCfg = dark ? darkTheme : lightTheme;

  return (
    <ConfigProvider theme={themeCfg}>
      <SpinKeyframes />
      {screen === 'login' ? (
        <div>
          <LoginScreen dark={dark} onEnter={()=>setScreen('dashboard')} />
          <div style={{ position:'fixed', top:16, right:16, zIndex:10 }}>
            <Button size="small" onClick={()=>setScreen('dashboard')}>← Назад в приложение</Button>
          </div>
        </div>
      ) : (
        <Layout style={{ minHeight:'100vh' }}>
          <Sider width={228} collapsible collapsed={collapsed} onCollapse={setCollapsed}
            breakpoint="lg" collapsedWidth={64} theme="dark">
            <div className="dkp-logo" style={ collapsed ? {padding:'16px 0', justifyContent:'center'} : {} }>
              <div className="dkp-logo-mark">{Icons.cloud}</div>
              {!collapsed && <div><div className="dkp-logo-text">DKP</div><div className="dkp-logo-sub">Knowledge Portal</div></div>}
            </div>
            <Menu theme="dark" mode="inline" selectedKeys={[screen]} items={menuItems}
              onSelect={({key})=>setScreen(key)} style={{ border:'none' }} />
          </Sider>
          <Layout>
            <ShellHeader dark={dark} setDark={setDark} screen={screen} />
            <Content style={{ padding:24, maxWidth:1560, width:'100%', margin:'0 auto' }}>
              {SCREENS[screen].el(dark)}
            </Content>
          </Layout>
        </Layout>
      )}
    </ConfigProvider>
  );
};

const ShellHeader = ({ dark, setDark, screen }) => {
  const { token } = antdTheme.useToken();
  const s = SCREENS[screen];
  const crumbs = (s.crumb || [s.title]).map(t=>({ title:t }));
  return (
    <Header style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
      borderBottom:`1px solid ${token.colorBorderSecondary}`, position:'sticky', top:0, zIndex:5 }}>
      <Breadcrumb items={[{ title:'DKP' }, ...crumbs]} />
      <Space size={14}>
        <Input placeholder="Глобальный поиск…  ( / )" prefix={<span style={{color:token.colorTextTertiary}}>{Icons.search}</span>}
          size="small" style={{ width:220 }} variant="filled" />
        <Tooltip title={dark ? 'Светлая тема' : 'Тёмная тема'}>
          <Switch checked={dark} onChange={setDark}
            checkedChildren={Icons.moon} unCheckedChildren={Icons.sun} />
        </Tooltip>
        <Dropdown menu={{ items:[
          { key:'p', label:'Профиль' },
          { key:'t', label:'Мои токены' },
          { type:'divider' },
          { key:'q', label:<Space size={8}>{Icons.door}Выход</Space>, danger:true },
        ]}}>
          <Space style={{ cursor:'pointer' }} size={10}>
            <Avatar size={30} style={{ background:'#2F54EB', fontWeight:600, fontSize:12 }}>АС</Avatar>
            <div style={{ lineHeight:1.2, textAlign:'left' }}>
              <div style={{ fontSize:13, fontWeight:600, color:token.colorText }}>А. Серикова</div>
              <div style={{ fontSize:11, color:token.colorTextTertiary }}>Администратор</div>
            </div>
          </Space>
        </Dropdown>
      </Space>
    </Header>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
